name: Portfolio Optimization Notebook Runner

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Check formatting
        run: uv run ruff format --check src/

      - name: Lint
        run: uv run ruff check src/

      - name: Run tests
        run: uv run pytest tests/ -v

  run-notebooks:
    needs: [lint]
    runs-on: arc-runners-org-nvidia-ai-bp-1-gpu
    env:
      PYTHON_VERSION: 3.12
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Git LFS
        run: |
          echo "===================== Install Git LFS ====================="
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install

      - name: Pull Git LFS files
        run: |
          echo "===================== Pull LFS files ====================="
          git lfs pull

      - name: Check System Info
        run: |
          echo "===================== System Info ====================="
          more /etc/os-release
          uname -a
          docker version

      - name: Run container and execute notebooks
        run: |
          docker run --gpus all --rm \
            -v "$(pwd):/workspace" \
            -w /workspace \
            nvcr.io/nvidia/pytorch:25.08-py3 \
            bash -lc '
              set -euo pipefail
              echo "===================== Python and GPU Info ====================="
              python --version
              nvidia-smi

              echo "===================== Install uv ====================="
              curl -LsSf https://astral.sh/uv/install.sh | sh
              export PATH="/root/.cargo/bin:$PATH"
              source "$HOME/.local/bin/env"

              echo "===================== Install Dependencies with uv ====================="
              uv sync --extra cuda13 --extra dev


              echo "===================== Install Jupyter and other packages ====================="
              pip install jupyter jupyterlab ipykernel papermill nbconvert

              echo "===================== Create Jupyter Kernel ====================="
              uv run python -m ipykernel install --user --name=portfolio-opt --display-name "Portfolio Optimization"

              echo "===================== List Jupyter Kernel ====================="
              jupyter kernelspec list

              echo "===================== Change to notebooks directory ====================="
              cd notebooks

              overall_status=0
              : > notebook_status.txt

              run_notebook() {
                local input="$1"
                local output="$2"
                local name="${input%.ipynb}"

                echo "===================== Run ${input} notebook ====================="
                set +e
                papermill "$input" "$output" --kernel portfolio-opt --log-output --log-level DEBUG 2>&1 \
                  | sed -E "s/\x27image\/png\x27: \x27[^\x27]*\x27/\x27image\/png\x27: \x27<elided>\x27/g" \
                  | tee "${name}.papermill.log"
                local status="${PIPESTATUS[0]}"
                set -e

                if [ "$status" -eq 0 ]; then
                  echo "${input},PASS" | tee -a notebook_status.txt
                else
                  echo "${input},FAIL(${status})" | tee -a notebook_status.txt
                  overall_status=1
                fi
              }

              convert_notebook() {
                local input="$1"
                local name="${input%.ipynb}"

                if [ ! -s "$input" ]; then
                  echo "nbconvert:${input},SKIP(no output notebook)" | tee -a notebook_status.txt
                  overall_status=1
                  return
                fi

                echo "===================== Convert ${input} to HTML ====================="
                set +e
                jupyter nbconvert --to html "$input" 2>&1 | tee "${name}.nbconvert.log"
                local status="${PIPESTATUS[0]}"
                set -e

                if [ "$status" -eq 0 ]; then
                  echo "nbconvert:${input},PASS" | tee -a notebook_status.txt
                else
                  echo "nbconvert:${input},FAIL(${status})" | tee -a notebook_status.txt
                  overall_status=1
                fi
              }

              run_notebook cvar_basic.ipynb cvar_basic_result.ipynb
              run_notebook efficient_frontier.ipynb efficient_frontier_result.ipynb
              run_notebook rebalancing_strategies.ipynb rebalancing_strategies_result.ipynb
              run_notebook launchable.ipynb launchable_brev_result.ipynb

              echo "===================== Convert notebooks to HTML ====================="
              convert_notebook cvar_basic_result.ipynb
              convert_notebook efficient_frontier_result.ipynb
              convert_notebook rebalancing_strategies_result.ipynb
              convert_notebook launchable_brev_result.ipynb

              echo "===================== Notebook status summary ====================="
              cat notebook_status.txt
              exit "$overall_status"
            '

      - name: Verify results
        if: success()
        env:
          TEST_DOCKER_PULL_KEY: ${{ secrets.TEST_DOCKER_PULL_KEY }}
        run: |
          set -euo pipefail
          echo "Checking for generated files...."
          test -s notebooks/cvar_basic_result.html
          test -s notebooks/efficient_frontier_result.html
          test -s notebooks/rebalancing_strategies_result.html
          test -s notebooks/launchable_brev_result.html
          ls -lh notebooks/*result* notebooks/*.papermill.log notebooks/*.nbconvert.log notebooks/notebook_status.txt
          cd notebooks
          echo "$TEST_DOCKER_PULL_KEY" |docker login nvcr.io --username  '$oauthtoken' --password-stdin
          docker run --rm \
            -v ./cvar_basic_result.html:/app/input/quantitative_portfolio_optimization/cvar_basic.html  \
            -v ./efficient_frontier_result.html:/app/input/quantitative_portfolio_optimization/efficient_frontier.html  \
            -v ./rebalancing_strategies_result.html:/app/input/quantitative_portfolio_optimization/rebalancing_strategies.html  \
            -v ./launchable_brev_result.html:/app/input/quantitative_portfolio_optimization/launchable_brev_result.html  \
            -v "$(pwd):/workspace" \
            nvcr.io/rw983xdqtcdp/auto_test_team/blueprint-github-test-image:latest \
            pytest -m quantitative_portfolio_optimization --disable-warnings --html=/workspace/quantitative_portfolio_optimization.html --self-contained-html


      - name: Upload notebook results as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notebook-results
          path: |
             notebooks/cvar_basic_result.html
             notebooks/cvar_basic_result.ipynb
             notebooks/efficient_frontier_result.html
             notebooks/efficient_frontier_result.ipynb
             notebooks/rebalancing_strategies_result.html
             notebooks/rebalancing_strategies_result.ipynb
             notebooks/launchable_brev_result.html
             notebooks/launchable_brev_result.ipynb
             notebooks/quantitative_portfolio_optimization.html
             notebooks/*.papermill.log
             notebooks/*.nbconvert.log
             notebooks/notebook_status.txt
          retention-days: 30

      - name: Set result output
        id: set_result
        if: always()
        run: |
          echo "RESULT=$(if [ ${{ job.status }} == 'success' ]; then echo 'PASS'; else echo 'FAIL'; fi)" >> $GITHUB_OUTPUT

      - name: Send mail
        uses: dawidd6/action-send-mail@6e71c855c9a091d80a519621b9fd3e8d252ca40c
        if: always()
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}

          subject: "QA Test Workflow Result for ${{ github.repository }}"
          to: Github-Action-Blueprint-QA@nvidia.com
          from: github-workflow-notification@gmail.com
          html_body: |
            <p>Hello,</p>

            <p>The workflow for repository: <strong>${{ github.repository }}</strong> has completed.<br>
            <strong>Result:</strong> ${{ steps.set_result.outputs.RESULT }}</p>

            <p>You can review the details on GitHub:<br>
            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}</a></p>

            <p>Thanks!</p>
